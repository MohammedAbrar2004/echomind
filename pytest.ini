[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
markers =
    performance: Performance benchmark tests
    slow: Slow running tests (timeout > 1 second)
    integration: Integration tests that test module interactions
    unit: Unit tests for individual functions
asyncio_mode = auto
