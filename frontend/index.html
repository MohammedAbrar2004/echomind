<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMind — Personal Cognitive Memory System</title>
    
    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts"></script>
    
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide@latest" type="module"></script>
    
    <!-- Vis.js for Graph Visualization -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network/styles/vis-network.min.css" rel="stylesheet" type="text/css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }
        
        .echomind-container {
            display: flex;
            height: 100vh;
            background-color: #0f1117;
        }
        
        .sidebar {
            width: 280px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed {
            width: 72px;
        }
        
        .sidebar-header {
            padding: 24px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #00e5cc;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 16px 8px;
            overflow-y: auto;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            cursor: pointer;
            border-radius: 2px;
            border-left: 2px solid transparent;
            transition: all 0.2s ease;
            color: #8b949e;
            font-size: 14px;
            user-select: none;
        }
        
        .nav-item:hover {
            background-color: rgba(0, 229, 204, 0.05);
            color: #00e5cc;
        }
        
        .nav-item.active {
            background-color: rgba(0, 229, 204, 0.1);
            color: #00e5cc;
            border-left-color: #00e5cc;
        }
        
        .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        
        .nav-label {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .top-bar {
            height: 60px;
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            gap: 16px;
        }
        
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #c9d1d9;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .health-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-left: 24px;
            border-left: 1px solid #30363d;
            min-width: fit-content;
        }
        
        .health-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #8b949e;
        }
        
        .health-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .health-indicator.active {
            background-color: #00e5cc;
        }
        
        .health-indicator.inactive {
            background-color: #8b949e;
        }
        
        .health-indicator.error {
            background-color: #f85149;
            animation: pulse-error 1s ease-in-out infinite;
        }
        
        .health-indicator.warning {
            background-color: #d29922;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes pulse-error {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            background-color: #0f1117;
        }
        
        .content-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .content-area::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        
        .content-area::-webkit-scrollbar-thumb:hover {
            background: #424a52;
        }
        
        /* Query Section */
        .query-container {
            display: flex;
            gap: 32px;
            height: 100%;
        }
        
        .query-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }
        
        .query-input-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 700px;
        }
        
        .query-input {
            flex: 1;
            padding: 16px 20px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            color: #c9d1d9;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .query-input:focus {
            border-color: #00e5cc;
            box-shadow: 0 0 0 2px rgba(0, 229, 204, 0.1);
        }
        
        .query-btn-mic {
            padding: 16px 20px;
            background-color: #00e5cc;
            border: none;
            border-radius: 2px;
            color: #0f1117;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .query-btn-mic:hover {
            background-color: #00d4b8;
        }
        
        .query-response {
            width: 100%;
            max-width: 700px;
            padding: 24px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
        }
        
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }
        
        .model-badge {
            padding: 4px 10px;
            background-color: rgba(0, 229, 204, 0.1);
            border: 1px solid #00e5cc;
            border-radius: 2px;
            font-size: 11px;
            color: #00e5cc;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .latency-badge {
            font-size: 12px;
            color: #8b949e;
        }
        
        .response-body {
            margin-bottom: 16px;
            line-height: 1.6;
            color: #c9d1d9;
        }
        
        .sources-panel {
            margin-top: 16px;
        }
        
        .sources-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .source-chunk {
            padding: 12px;
            background-color: rgba(0, 229, 204, 0.03);
            border: 1px solid #30363d;
            border-left: 3px solid #00e5cc;
            border-radius: 0;
            font-size: 12px;
        }
        
        .source-chunk-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        
        .source-badge {
            padding: 2px 8px;
            background-color: rgba(0, 229, 204, 0.15);
            border-radius: 2px;
            font-size: 10px;
            color: #00e5cc;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .source-time {
            font-size: 11px;
            color: #8b949e;
        }
        
        .salience-bar {
            width: 100%;
            height: 3px;
            background-color: #30363d;
            border-radius: 1px;
            overflow: hidden;
        }
        
        .salience-fill {
            height: 100%;
            background-color: #00e5cc;
            border-radius: 1px;
        }
        
        .source-excerpt {
            margin-top: 8px;
            color: #8b949e;
            line-height: 1.4;
            font-style: italic;
        }
        
        .query-history {
            width: 240px;
            border-left: 1px solid #30363d;
            padding: 16px;
            overflow-y: auto;
        }
        
        .history-title {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
        }
        
        .history-item {
            padding: 8px;
            margin-bottom: 8px;
            background-color: transparent;
            border: 1px solid #30363d;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            color: #8b949e;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-item:hover {
            background-color: rgba(0, 229, 204, 0.05);
            color: #00e5cc;
            border-color: #00e5cc;
        }
        
        /* Memory Browser */
        .memory-controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .filter-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .chip {
            padding: 6px 12px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            color: #8b949e;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .chip:hover {
            border-color: #00e5cc;
            color: #00e5cc;
        }
        
        .chip.active {
            background-color: #00e5cc;
            border-color: #00e5cc;
            color: #0f1117;
        }
        
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 16px;
        }
        
        .memory-card {
            padding: 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            transition: all 0.2s ease;
        }
        
        .memory-card:hover {
            border-color: #00e5cc;
            box-shadow: 0 0 0 1px rgba(0, 229, 204, 0.2);
        }
        
        .memory-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .memory-source {
            padding: 4px 8px;
            background-color: rgba(0, 229, 204, 0.1);
            border: 1px solid #00e5cc;
            border-radius: 2px;
            font-size: 10px;
            color: #00e5cc;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .memory-time {
            font-size: 11px;
            color: #8b949e;
        }
        
        .memory-content {
            margin-bottom: 12px;
            line-height: 1.4;
            color: #c9d1d9;
            font-size: 13px;
        }
        
        .memory-salience {
            margin-bottom: 12px;
        }
        
        .salience-label {
            font-size: 10px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        
        /* Ingest */
        .ingest-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #30363d;
        }
        
        .ingest-tab {
            padding: 12px 20px;
            background-color: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        
        .ingest-tab:hover {
            color: #00e5cc;
        }
        
        .ingest-tab.active {
            color: #00e5cc;
            border-bottom-color: #00e5cc;
        }
        
        .ingest-form {
            max-width: 600px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .form-input:focus,
        .form-textarea:focus {
            border-color: #00e5cc;
            box-shadow: 0 0 0 2px rgba(0, 229, 204, 0.1);
        }
        
        .form-textarea {
            min-height: 150px;
            resize: vertical;
            font-family: 'Courier New', monospace;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-button {
            padding: 12px 24px;
            background-color: #00e5cc;
            border: none;
            border-radius: 2px;
            color: #0f1117;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-button:hover {
            background-color: #00d4b8;
        }
        
        .drag-drop-zone {
            padding: 40px 24px;
            background-color: #161b22;
            border: 2px dashed #30363d;
            border-radius: 2px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .drag-drop-zone:hover,
        .drag-drop-zone.dragover {
            border-color: #00e5cc;
            background-color: rgba(0, 229, 204, 0.03);
        }
        
        .drag-drop-text {
            color: #8b949e;
            font-size: 14px;
        }
        
        .voice-recorder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .record-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #00e5cc;
            border: none;
            color: #0f1117;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            margin: 24px 0;
        }
        
        .record-button:hover {
            background-color: #00d4b8;
        }
        
        .record-button.recording {
            background-color: #f85149;
            animation: pulse-record 1s ease-in-out infinite;
        }
        
        @keyframes pulse-record {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .waveform {
            width: 300px;
            height: 80px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .waveform-bar {
            width: 3px;
            background-color: #00e5cc;
            margin: 0 2px;
            border-radius: 1px;
            animation: waveform-animate 0.5s ease-in-out infinite;
        }
        
        @keyframes waveform-animate {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 32px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: #30363d;
        }
        
        .timeline-entry {
            margin-bottom: 24px;
            position: relative;
        }
        
        .timeline-dot {
            position: absolute;
            left: -26px;
            top: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #0f1117;
            background-color: #00e5cc;
        }
        
        .timeline-entry.high-salience .timeline-dot {
            background-color: #00e5cc;
        }
        
        .timeline-entry.medium-salience .timeline-dot {
            background-color: #d29922;
        }
        
        .timeline-entry.low-salience .timeline-dot {
            background-color: #8b949e;
        }
        
        .timeline-content {
            padding: 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            border-left: 3px solid #00e5cc;
        }
        
        .timeline-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
        }
        
        .timeline-source {
            padding: 2px 8px;
            background-color: rgba(0, 229, 204, 0.1);
            border-radius: 2px;
            color: #00e5cc;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .timeline-time {
            color: #8b949e;
        }
        
        .timeline-body {
            color: #c9d1d9;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        /* Relationships / Graph */
        .relationships-container {
            display: flex;
            gap: 16px;
            height: 100%;
        }
        
        .graph-canvas {
            flex: 1;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
        }
        
        .entity-sidebar {
            width: 280px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
            padding: 16px;
            overflow-y: auto;
        }
        
        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .entity-item {
            padding: 8px 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            color: #8b949e;
            transition: all 0.2s ease;
        }
        
        .entity-item:hover,
        .entity-item.selected {
            background-color: rgba(0, 229, 204, 0.1);
            color: #00e5cc;
            border-color: #00e5cc;
        }
        
        /* Commitments / Kanban */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        
        .kanban-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .kanban-header {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            font-weight: 600;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
        }
        
        .kanban-card {
            padding: 12px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-left: 3px solid #00e5cc;
            border-radius: 2px;
            font-size: 12px;
        }
        
        .kanban-card-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #c9d1d9;
        }
        
        .kanban-card-meta {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .kanban-badge {
            padding: 2px 6px;
            background-color: rgba(0, 229, 204, 0.1);
            border-radius: 1px;
            font-size: 10px;
            color: #00e5cc;
        }
        
        .kanban-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        
        .kanban-btn {
            padding: 4px 8px;
            background-color: rgba(0, 229, 204, 0.15);
            border: none;
            border-radius: 1px;
            color: #00e5cc;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .kanban-btn:hover {
            background-color: rgba(0, 229, 204, 0.25);
        }
        
        /* Connectors */
        .connectors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .connector-card {
            padding: 20px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 2px;
        }
        
        .connector-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .connector-name {
            font-size: 14px;
            font-weight: 600;
            color: #c9d1d9;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-badge.active {
            background-color: rgba(0, 229, 204, 0.1);

                        {activeTab === 'voice-note' && (
                            <div className="voice-recorder">
                                <button
                                    className={`record-button ${isRecording ? 'recording' : ''}`}
                                    onClick={() => setIsRecording(!isRecording)}
                                >
                                    {isRecording ? '⏹' : '🎤'}
                                </button>
                                {isRecording && (
                                    <div className="waveform">
                                        {[...Array(20)].map((_, i) => <div key={i} className="waveform-bar"></div>)}
                                    </div>
                                )}
                                <div style={{fontSize: '12px', color: '#8b949e'}}>{isRecording ? 'Recording...' : 'Click to start recording'}</div>
                                {!isRecording && (
                                    <>
                                        <div className="form-group" style={{width: '100%'}}>
                                            <label className="form-label">Transcript Preview</label>
                                            <input type="text" className="form-input" placeholder="[Transcript will appear here]" disabled />
                                        </div>
                                        <button className="form-button">Submit to Memory</button>
                                    </>
                                )}
                            </div>
                        )}
                        
                        {activeTab === 'document' && (
                            <>
                                <div className="form-group">
                                    <label className="form-label">Upload Document (PDF, DOCX)</label>
                                    <div className="drag-drop-zone">
                                        <div className="drag-drop-text">📄 Drag and drop here or click to browse</div>
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Document Title</label>
                                    <input type="text" className="form-input" placeholder="Title..." />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Description</label>
                                    <textarea className="form-textarea" placeholder="Why is this important?" style={{minHeight: '100px'}}></textarea>
                                </div>
                                <button className="form-button">Submit to Memory</button>
                            </>
                        )}
                    </div>
                </>
            );
        }
        
        function TimelineSection() {
            const sorted = [...MOCK_CHUNKS].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            return (
                <div className="timeline">
                    {sorted.map(chunk => {
                        let salienceClass = 'low-salience';
                        if (chunk.salience >= 0.8) salienceClass = 'high-salience';
                        else if (chunk.salience >= 0.6) salienceClass = 'medium-salience';
                        
                        return (
                            <div key={chunk.id} className={`timeline-entry ${salienceClass}`}>
                                <div className="timeline-dot"></div>
                                <div className="timeline-content">
                                    <div className="timeline-meta">
                                        <span className="timeline-source">{chunk.source}</span>
                                        <span className="timeline-time">{chunk.timestamp}</span>
                                    </div>
                                    <div className="timeline-body">{chunk.content}</div>
                                    <div style={{fontSize: '11px', color: '#8b949e'}}>Salience: {(chunk.salience * 100).toFixed(0)}%</div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }
        
        function RelationshipsSection() {
            const [selectedEntity, setSelectedEntity] = useState(null);
            const graphContainer = useRef(null);
            
            useEffect(() => {
                if (!graphContainer.current) return;
                
                const nodes = new vis.DataSet([
                    { id: 1, label: 'Sarah Chen', title: 'Key Collaborator' },
                    { id: 2, label: 'Alex Rodriguez', title: 'Infrastructure Lead' },
                    { id: 3, label: 'John D.', title: 'Startup Founder' },
                    { id: 4, label: 'Acme Corp', title: 'Organization' },
                    { id: 5, label: 'Dr. Peterson', title: 'Doctor' },
                ]);
                
                const edges = new vis.DataSet([
                    { from: 1, to: 4 },
                    { from: 2, to: 4 },
                    { from: 3, to: 2 },
                    { from: 5, to: 1 },
                ]);
                
                const data = { nodes, edges };
                const options = {
                    physics: { enabled: true },
                    nodes: {
                        shape: 'box',
                        margin: { top: 8, right: 8, bottom: 8, left: 8 },
                        font: { color: '#00e5cc', size: 14, face: 'monospace' },
                        color: { background: '#161b22', border: '#00e5cc', highlight: { background: '#00e5cc', border: '#0f1117' } }
                    },
                    edges: {
                        color: { color: '#30363d', highlight: '#00e5cc' },
                        arrows: { to: { enabled: true, scaleFactor: 0.5 } }
                    },
                    interaction: { navigationButtons: true, keyboard: false }
                };
                
                new vis.Network(graphContainer.current, data, options);
            }, []);
            
            return (
                <div className="relationships-container">
                    <div ref={graphContainer} className="graph-canvas"></div>
                    <div className="entity-sidebar">
                        <div style={{fontSize: '12px', color: '#8b949e', textTransform: 'uppercase', fontWeight: 600, marginBottom: '12px', paddingBottom: '12px', borderBottom: '1px solid #30363d'}}>
                            Entities
                        </div>
                        <div className="entity-list">
                            {MOCK_ENTITIES.map(e => (
                                <div key={e.id} className={`entity-item ${selectedEntity === e.id ? 'selected' : ''}`} onClick={() => setSelectedEntity(e.id)}>
                                    <div style={{fontWeight: 600}}>{e.name}</div>
                                    <div style={{fontSize: '10px', color: '#8b949e', marginTop: '4px'}}>{e.type} • {e.count} mentions</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        
        function CommitmentsSection() {
            const tasks = MOCK_COMMITMENTS.filter(c => c.category === 'tasks');
            const events = MOCK_COMMITMENTS.filter(c => c.category === 'events');
            const promises = MOCK_COMMITMENTS.filter(c => c.category === 'promises');
            
            const renderCards = (items) => items.map(item => (
                <div key={item.id} className="kanban-card">
                    <div className="kanban-card-title">{item.title}</div>
                    <div className="kanban-card-meta">
                        <span className="kanban-badge">{item.source}</span>
                        <span className="kanban-badge">{item.priority}</span>
                    </div>
                    <div style={{fontSize: '11px', color: '#8b949e', marginBottom: '8px'}}>{item.date}</div>
                    <div className="kanban-actions">
                        <button className="kanban-btn">Complete</button>
                        <button className="kanban-btn">Snooze</button>
                    </div>
                </div>
            ));
            
            return (
                <div className="kanban-board">
                    <div className="kanban-column">
                        <div className="kanban-header">🎯 Open Tasks ({tasks.length})</div>
                        {renderCards(tasks)}
                    </div>
                    <div className="kanban-column">
                        <div className="kanban-header">📅 Upcoming Events ({events.length})</div>
                        {renderCards(events)}
                    </div>
                    <div className="kanban-column">
                        <div className="kanban-header">🤝 Promises / Follow-ups ({promises.length})</div>
                        {renderCards(promises)}
                    </div>
                </div>
            );
        }
        
        function ConnectorsSection() {
            const connectors = [
                { name: 'Gmail', status: 'Active', icon: '📧', lastSync: '1 min ago', chunks: 2847, mode: 'Pull' },
                { name: 'WhatsApp', status: 'Auth Required', icon: '💬', lastSync: '— —', chunks: 1563, mode: 'Push' },
                { name: 'Google Calendar', status: 'Inactive', icon: '📅', lastSync: '2 days', chunks: 324, mode: 'Pull' },
                { name: 'Google Meet', status: 'Inactive', icon: '🎥', lastSync: '— —', chunks: 0, mode: 'Pull' },
                { name: 'Manual Entry', status: 'Active', icon: '✍️', lastSync: 'Just now', chunks: 412, mode: 'Push' },
            ];
            
            return (
                <>
                    <div className="connectors-grid">
                        {connectors.map((conn, i) => (
                            <div key={i} className="connector-card">
                                <div className="connector-header">
                                    <div className="connector-name">{conn.icon} {conn.name}</div>
                                    <span className={`status-badge ${conn.status.toLowerCase().replace(' ', '-')}`}>
                                        {conn.status}
                                    </span>
                                </div>
                                <div className="connector-info">
                                    <div className="info-row">
                                        <span>Last Sync</span>
                                        <span className="info-value">{conn.lastSync}</span>
                                    </div>
                                    <div className="info-row">
                                        <span>Total Chunks</span>
                                        <span className="info-value">{conn.chunks}</span>
                                    </div>
                                    <div className="info-row">
                                        <span>Mode</span>
                                        <span className="info-value">{conn.mode}</span>
                                    </div>
                                </div>
                                <div className="connector-actions">
                                    <button className="action-btn">Auth</button>
                                    <button className="action-btn">Sync Now</button>
                                    <button className="action-btn">Logs</button>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div style={{marginTop: '32px'}}>
                        <h3 style={{fontSize: '12px', color: '#8b949e', textTransform: 'uppercase', fontWeight: 600, marginBottom: '12px'}}>Ingestion Runs Log</h3>
                        <table className="data-table">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Connector</th>
                                    <th>Chunks</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>2026-04-16 14:23</td><td>Gmail</td><td>12</td><td>3.2s</td><td style={{color: '#00e5cc'}}>Success</td></tr>
                                <tr><td>2026-04-16 14:15</td><td>WhatsApp</td><td>5</td><td>1.1s</td><td style={{color: '#00e5cc'}}>Success</td></tr>
                                <tr><td>2026-04-16 13:45</td><td>Manual</td><td>1</td><td>0.2s</td><td style={{color: '#00e5cc'}}>Success</td></tr>
                            </tbody>
                        </table>
                    </div>
                </>
            );
        }
        
        function SalienceSection() {
            return (
                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '32px'}}>
                    {/* LEFT COLUMN */}
                    <div className="settings-section">
                        <h3 className="settings-title">Keyword Rules</h3>
                        <table className="data-table">
                            <thead>
                                <tr>
                                    <th>Keyword</th>
                                    <th>Weight</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>deadline</td><td>×2.0</td><td><button className="action-btn" style={{fontSize: '10px'}}>Edit</button></td></tr>
                                <tr><td>urgent</td><td>×1.8</td><td><button className="action-btn" style={{fontSize: '10px'}}>Edit</button></td></tr>
                                <tr><td>meeting</td><td>×1.5</td><td><button className="action-btn" style={{fontSize: '10px'}}>Edit</button></td></tr>
                            </tbody>
                        </table>
                        
                        <h3 className="settings-title" style={{marginTop: '24px'}}>Entity Type Weights</h3>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            {['People', 'Places', 'Organizations', 'Dates'].map(type => (
                                <div key={type} className="slider-group">
                                    <label className="slider-label">
                                        <span>{type}</span>
                                        <span style={{color: '#00e5cc'}}>1.0×</span>
                                    </label>
                                    <input type="range" min="0" max="2" step="0.1" defaultValue="1" />
                                </div>
                            ))}
                        </div>
                        
                        <h3 className="settings-title" style={{marginTop: '24px'}}>Source Weights</h3>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            {['Gmail', 'WhatsApp', 'Calendar', 'Manual'].map(src => (
                                <div key={src} className="slider-group">
                                    <label className="slider-label">
                                        <span>{src}</span>
                                        <span style={{color: '#00e5cc'}}>1.0×</span>
                                    </label>
                                    <input type="range" min="0" max="2" step="0.1" defaultValue="1" />
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* RIGHT COLUMN */}
                    <div className="settings-section">
                        <h3 className="settings-title">Global Salience Threshold</h3>
                        <div className="slider-group">
                            <input type="range" min="0" max="1" step="0.01" defaultValue="0.3" />
                            <div className="slider-label">
                                <span>0.30</span>
                                <span style={{fontSize: '10px', color: '#8b949e', fontWeight: 'normal'}}>Chunks below this are deprioritized</span>
                            </div>
                        </div>
                        
                        <button className="form-button" style={{marginTop: '16px', width: '100%'}}>Preview Impact</button>
                        
                        <h3 className="settings-title" style={{marginTop: '24px'}}>Decay Settings</h3>
                        <div className="slider-group">
                            <label className="slider-label">
                                <span>Half-Life (days)</span>
                                <span style={{color: '#00e5cc'}}>30d</span>
                            </label>
                            <input type="range" min="1" max="365" step="1" defaultValue="30" />
                        </div>
                        <p style={{fontSize: '11px', color: '#8b949e', marginTop: '12px'}}>Older chunks lose salience at this rate</p>
                        
                        <div style={{display: 'flex', gap: '12px', marginTop: '32px'}}>
                            <button className="form-button" style={{flex: 1}}>Save</button>
                            <button className="action-btn" style={{flex: 1}}>Reset Defaults</button>
                        </div>
                    </div>
                </div>
            );
        }
        
        function SettingsSection() {
            const [activeSettings, setActiveSettings] = useState('profile');
            
            return (
                <>
                    <div className="settings-tabs">
                        {['Profile', 'AI Model', 'Preferences', 'Tracked Entities', 'Security'].map(tab => (
                            <button
                                key={tab}
                                className={`settings-tab ${activeSettings === tab.toLowerCase() ? 'active' : ''}`}
                                onClick={() => setActiveSettings(tab.toLowerCase())}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>
                    
                    {activeSettings === 'profile' && (
                        <div className="ingest-form">
                            <div className="form-group">
                                <label className="form-label">Name</label>
                                <input type="text" className="form-input" placeholder="Your name" defaultValue="Alex" />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Timezone</label>
                                <input type="text" className="form-input" placeholder="America/Los_Angeles" defaultValue="America/Los_Angeles" />
                            </div>
                            <div className="form-group">
                                <label className="form-label">About Me</label>
                                <textarea className="form-textarea" placeholder="Used as context for AI answers" defaultValue="Product leader with 10+ years in tech. Focus on systems thinking and user-centered design."></textarea>
                            </div>
                            <button className="form-button">Save Changes</button>
                        </div>
                    )}
                    
                    {activeSettings === 'ai model' && (
                        <div className="ingest-form">
                            <div className="form-group">
                                <label className="form-label">Primary Model</label>
                                <select className="form-input">
                                    <option>GPT-4o - $$$</option>
                                    <option>GPT-4o mini - $$</option>
                                    <option>Claude Sonnet - $$$</option>
                                    <option>Claude Haiku - $</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">OpenAI API Key</label>
                                <input type="password" className="form-input" placeholder="sk-..." />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Anthropic API Key</label>
                                <input type="password" className="form-input" placeholder="sk-ant-..." />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Response Style</label>
                                <select className="form-input">
                                    <option>Concise</option>
                                    <option>Balanced</option>
                                    <option>Detailed</option>
                                </select>
                            </div>
                            <button className="form-button">Test Keys</button>
                            <button className="form-button" style={{marginTop: '12px'}}>Save</button>
                        </div>
                    )}
                    
                    {activeSettings === 'preferences' && (
                        <div style={{maxWidth: '500px'}}>
                            {[
                                { label: 'Proactive commitment detection', key: 'commitments' },
                                { label: 'Auto-tag entities', key: 'autoTag' },
                                { label: 'Include source citations', key: 'citations' },
                                { label: 'Enable voice input by default', key: 'voice' },
                            ].map(pref => (
                                <div key={pref.key} className="toggle-switch">
                                    <div className="switch on"></div>
                                    <label className="toggle-label">{pref.label}</label>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    {activeSettings === 'tracked entities' && (
                        <div className="ingest-form">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Entity</th>
                                        <th>Type</th>
                                        <th>Mentions</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {MOCK_ENTITIES.map(e => (
                                        <tr key={e.id}>
                                            <td>{e.name}</td>
                                            <td>{e.type}</td>
                                            <td>{e.count}</td>
                                            <td><button className="action-btn">Remove</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                    
                    {activeSettings === 'security' && (
                        <div style={{maxWidth: '500px'}}>
                            <div className="form-group">
                                <label className="form-label">Change Password</label>
                                <input type="password" className="form-input" placeholder="Current password" />
                                <input type="password" className="form-input" placeholder="New password" style={{marginTop: '8px'}} />
                                <button className="form-button" style={{marginTop: '12px'}}>Change Password</button>
                            </div>
                            
                            <div className="danger-zone">
                                <div className="danger-title">⚠️ Danger Zone</div>
                                <p style={{fontSize: '12px', color: '#8b949e', marginBottom: '12px'}}>Permanently delete all memory data. This cannot be undone.</p>
                                <button className="danger-btn">Wipe All Data</button>
                            </div>
                        </div>
                    )}
                </>
            );
        }
        
        // ===== RENDER APP =====
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
